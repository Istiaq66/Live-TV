name: live_tv
description: "Drishto — free live TV: news, movies, sports, music, kids and more."
publish_to: 'none'

# version: <build-name>+<build-number>. build-name = Android versionName / iOS
# CFBundleShortVersionString; build-number = Android versionCode / iOS CFBundleVersion.
version: 1.2.3+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Localization (multilingual UI: English + Bengali).
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # Media playback (libmpv core) — handles HLS .m3u8 AND raw mpegts/TS streams,
  # cross-platform (Windows / Android / iOS / Linux / macOS).
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Lightweight HTTP probes for stream health-checking.
  http: ^1.2.2

  # Persist favorites + last-watched across launches.
  shared_preferences: ^2.3.2

  # Read app version/build at runtime for the About screen.
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # App-icon generation (build-time only).
  image: ^4.3.0
  flutter_launcher_icons: ^0.14.1

  flutter_lints: ^5.0.0

# App launcher icons. Regenerate with: dart run flutter_launcher_icons
# (run `dart run tool/gen_icon.dart` first if the source PNGs are missing).
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1B5E20"
    theme_color: "#1B5E20"

flutter:
  # Generate localization classes from the ARB files in lib/l10n.
  generate: true
  uses-material-design: true

  assets:
    - assets/playlist.m3u

  fonts:
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali.ttf