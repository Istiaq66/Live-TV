name: Build & Release

# Tag a commit (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build signed
# artifacts and publish a GitHub Release. Manual runs build artifacts only.
on:
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for manual build (e.g. 1.0.0)"
        required: false
        default: "0.1.0-dev"

env:
  FLUTTER_VERSION: "3.32.6"

jobs:
  # ---------------------------------------------------------------- version
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"           # tagged release
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            ver="${{ github.event.inputs.version }}"  # manual dispatch
          else
            ver="0.0.0-dev-${GITHUB_SHA::7}"          # branch push (main/dev)
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $ver"

  # ---------------------------------------------------------------- Android
  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Wire up release signing only when the keystore secret is present.
      # Without it, Gradle falls back to the debug key so the release still
      # publishes an installable (debug-signed) APK.
      - name: Restore keystore + key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Warn if unsigned
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building a debug-signed APK."

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ needs.version.outputs.version }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/Kickora-${{ needs.version.outputs.version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  # ---------------------------------------------------------------- Windows
  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ needs.version.outputs.version }}

      - name: Build installer (Inno Setup)
        run: |
          iscc /DAppVersion=${{ needs.version.outputs.version }} windows\installer\setup.iss
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ---------------------------------------------------------------- Release
  release:
    needs: [version, android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kickora ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-installer/*.exe