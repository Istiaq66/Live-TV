name: Build & Release

# Tag a commit (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build signed
# artifacts and publish a GitHub Release. Manual runs build artifacts only.
on:
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for manual build (e.g. 1.0.0)"
        required: false
        default: "0.1.0-dev"

env:
  FLUTTER_VERSION: "3.32.6"

jobs:
  # ---------------------------------------------------------------- version
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"           # tagged release
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            ver="${{ github.event.inputs.version }}"  # manual dispatch
          else
            ver="0.0.0-dev-${GITHUB_SHA::7}"          # branch push (main/dev)
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $ver"

  # ---------------------------------------------------------------- Android
  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Configure release signing. The decision is made inside the script (not
      # a step `if:`, since the `secrets` context isn't allowed there): a
      # missing/corrupt secret falls back to the debug key so the release still
      # publishes an installable APK instead of failing the whole run.
      - name: Configure Android signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building a debug-signed APK."
            exit 0
          fi
          # Strip whitespace/newlines that often sneak into the base64 secret.
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > android/app/keystore.jks
          if keytool -list -keystore android/app/keystore.jks -storepass "$STORE_PASS" >/dev/null 2>&1; then
            cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
            echo "Release keystore valid — signing release APK."
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 is invalid or password wrong — falling back to debug signing. Re-create it with 'base64 -w0 keystore.jks'."
            rm -f android/app/keystore.jks
          fi

      - run: flutter pub get

      # Split per ABI (~16MB each) instead of a 48MB universal APK. Obfuscate +
      # strip Dart symbols for a bit more savings. We ship arm64 (modern phones)
      # and armeabi-v7a (older 32-bit); x86/x86_64 are emulator-only, dropped.
      - name: Build release APKs (per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --target-platform android-arm64,android-arm \
            --obfuscate --split-debug-info=build/symbols \
            --build-name=${{ needs.version.outputs.version }}

      - name: Collect APKs
        run: |
          mkdir -p dist
          V=${{ needs.version.outputs.version }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   "dist/Kickora-$V-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/Kickora-$V-armeabi-v7a.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  # ---------------------------------------------------------------- Windows
  windows:
    needs: version
    # windows-2022 ships VS2022 that Flutter 3.32 detects; windows-latest
    # (now the 2025 image) breaks detection → "Visual Studio 16 2019 not found".
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ needs.version.outputs.version }}

      - name: Build installer (Inno Setup)
        run: |
          iscc /DAppVersion=${{ needs.version.outputs.version }} windows\installer\setup.iss
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ---------------------------------------------------------------- Release
  release:
    needs: [version, android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kickora ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-installer/*.exe