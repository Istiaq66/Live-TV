name: Build & Release

# Tag a commit (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build signed
# artifacts and publish a GitHub Release. Manual runs build artifacts only.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for manual build (e.g. 1.0.0)"
        required: false
        default: "0.1.0-dev"

env:
  FLUTTER_VERSION: "3.32.6"

jobs:
  # ---------------------------------------------------------------- version
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------- Android
  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ needs.version.outputs.version }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/WorldCupLiveTV-${{ needs.version.outputs.version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  # ---------------------------------------------------------------- Windows
  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ needs.version.outputs.version }}

      - name: Build installer (Inno Setup)
        run: |
          iscc /DAppVersion=${{ needs.version.outputs.version }} windows\installer\setup.iss
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ---------------------------------------------------------------- Release
  release:
    needs: [version, android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: World Cup Live TV ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-installer/*.exe